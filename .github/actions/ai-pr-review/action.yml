name: "AI PR Review"
description: "Analyze PR diff, optionally run tests, and generate markdown review comment"

inputs:
  model:
    description: "Model/provider name: qwen, opencode, claude, gigachat, yandex, etc"
    required: false
    default: "qwen"

  prompt:
    description: "Custom prompt for AI review"
    required: false
    default: ""

  diff_file:
    description: "Path to diff file generated by previous step"
    required: true

  output_file:
    description: "Where to save generated review markdown"
    required: false
    default: "review.md"

  run_tests:
    description: "Run go test ./..."
    required: false
    default: "false"

  post_comment:
    description: "Post result as PR comment"
    required: false
    default: "false"

  api_base_url:
    description: "GitVerse/Gitea API base URL"
    required: false
    default: ""

  repository:
    description: "Repository in owner/repo format"
    required: false
    default: ""

  pr_number:
    description: "Pull request number"
    required: false
    default: ""

outputs:
  review_file:
    description: "Path to generated review file"
    value: ${{ steps.run.outputs.review_file }}

  review_summary:
    description: "Short review summary"
    value: ${{ steps.run.outputs.review_summary }}

runs:
  using: "composite"
  steps:
    - name: Run AI PR Review
      id: run
      shell: bash
      env:
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_DIFF_FILE: ${{ inputs.diff_file }}
        INPUT_OUTPUT_FILE: ${{ inputs.output_file }}
        INPUT_RUN_TESTS: ${{ inputs.run_tests }}
        INPUT_POST_COMMENT: ${{ inputs.post_comment }}
        INPUT_API_BASE_URL: ${{ inputs.api_base_url }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}

        # секреты лучше передавать через env из workflow
        AI_TOKEN: ${{ env.AI_TOKEN }}
        GITVERSE_TOKEN: ${{ env.GITVERSE_TOKEN }}
        GITEA_TOKEN: ${{ env.GITEA_TOKEN }}
      run: |
        chmod +x "${{ github.action_path }}/run.sh"
        "${{ github.action_path }}/run.sh"
