name: "AI PR Review"
description: "Run Qwen Code over PR diff and generate review"

inputs:
  openai_api_key:
    description: "API key for Qwen/OpenAI-compatible provider"
    required: true

  openai_base_url:
    description: "OpenAI-compatible API base URL"
    required: false
    default: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  openai_model:
    description: "Model name"
    required: false
    default: "qwen-coder-plus-latest"

  qwen_cli_version:
    description: "Qwen Code CLI version"
    required: false
    default: "latest"

  prompt:
    description: "Custom review prompt"
    required: false
    default: ""

  diff_file:
    description: "Path to PR diff file"
    required: true

  output_file:
    description: "Path to generated review markdown"
    required: false
    default: "review.md"

  run_tests:
    description: "Run go test ./..."
    required: false
    default: "false"

  post_comment:
    description: "Post review as PR comment"
    required: false
    default: "false"

  pr_number:
    description: "Pull request number"
    required: false
    default: ""

outputs:
  review_file:
    description: "Generated review file"
    value: ${{ steps.run.outputs.review_file }}

  review_summary:
    description: "Short review summary"
    value: ${{ steps.run.outputs.review_summary }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Run AI PR Review
      id: run
      shell: bash
      env:
        INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        INPUT_OPENAI_BASE_URL: ${{ inputs.openai_base_url }}
        INPUT_OPENAI_MODEL: ${{ inputs.openai_model }}
        INPUT_QWEN_CLI_VERSION: ${{ inputs.qwen_cli_version }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_DIFF_FILE: ${{ inputs.diff_file }}
        INPUT_OUTPUT_FILE: ${{ inputs.output_file }}
        INPUT_RUN_TESTS: ${{ inputs.run_tests }}
        INPUT_POST_COMMENT: ${{ inputs.post_comment }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        chmod +x "${{ github.action_path }}/run.sh"
        "${{ github.action_path }}/run.sh"
